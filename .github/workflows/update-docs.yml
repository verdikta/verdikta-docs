name: Update Documentation

on:
  push:
    branches: [main]
  schedule:
    # Check for updates every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update submodules
        run: |
          git pull --rebase
          git submodule update --remote --recursive
          
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-update submodules"
          git push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Smart Contract Documentation
        run: |
          # Install dependencies locally
          npm init -y
          npm install solidity-docgen solc@0.8.19 --save-dev
          
          # Debug: Show what contract directories exist
          echo "=== Contract Directory Discovery ==="
          echo "Dispatcher contracts:"
          find sources/dispatcher -name "*.sol" -type f 2>/dev/null || echo "No .sol files found in dispatcher"
          echo "Dispatcher Hardhat configs:"
          find sources/dispatcher -name "hardhat.config.*" -type f 2>/dev/null || echo "No Hardhat configs found in dispatcher"
          echo "Arbiter contracts:"
          find sources/arbiter -name "*.sol" -type f 2>/dev/null || echo "No .sol files found in arbiter"
          echo "Arbiter Hardhat configs:"
          find sources/arbiter -name "hardhat.config.*" -type f 2>/dev/null || echo "No Hardhat configs found in arbiter"
          echo "=================================="
          
          # Generate docs for dispatcher contracts
          if [ -d "sources/dispatcher/reputationBasedAggregator/contracts" ]; then
            echo "Generating dispatcher contract documentation..."
            cd sources/dispatcher
            
            # Create package.json if it doesn't exist
            if [ ! -f "package.json" ]; then
              npm init -y
            fi
            
            # Install Hardhat documentation plugins
            npm install hardhat @primitivefi/hardhat-dodoc hardhat-docgen --save-dev
            
            # Check if this is a Hardhat project
            if [ -f "hardhat.config.js" ] || [ -f "hardhat.config.ts" ]; then
              echo "Found Hardhat project, using Hardhat documentation tools..."
              
              # Try Hardhat-based documentation generation
              npx hardhat docgen 2>/dev/null || \
              npx hardhat dodoc 2>/dev/null || \
              echo "Hardhat documentation plugins not configured, falling back to simple parsing"
            else
              echo "Not a Hardhat project, using simple documentation generation..."
            fi
            
            # Create API generated directory
            mkdir -p ./docs/api/generated
            
            # Check if contracts exist first
            if [ -d "./reputationBasedAggregator/contracts" ] && [ -n "$(find ./reputationBasedAggregator/contracts -name '*.sol' 2>/dev/null)" ]; then
              echo "Found Solidity contracts, generating documentation..."
              
              # If Hardhat tools didn't work, create simple contract listing
              {
                echo "Creating simple contract documentation..."
                mkdir -p ./docs/api/generated
                echo "# Dispatcher Smart Contract API" > ./docs/api/generated/index.md
                echo "" >> ./docs/api/generated/index.md
                echo "## Available Contracts" >> ./docs/api/generated/index.md
                echo "" >> ./docs/api/generated/index.md
                
                for contract in ./reputationBasedAggregator/contracts/*.sol; do
                  if [ -f "$contract" ]; then
                    contract_name=$(basename "$contract" .sol)
                    echo "### $contract_name" >> ./docs/api/generated/index.md
                    echo "" >> ./docs/api/generated/index.md
                    echo "**File:** \`$(basename "$contract")\`" >> ./docs/api/generated/index.md
                    echo "" >> ./docs/api/generated/index.md
                    
                    # Extract contract declaration and basic info
                    grep -n "contract\|interface\|library" "$contract" | head -5 | while read line; do
                      echo "\`\`\`solidity" >> ./docs/api/generated/index.md
                      echo "$line" >> ./docs/api/generated/index.md
                      echo "\`\`\`" >> ./docs/api/generated/index.md
                      echo "" >> ./docs/api/generated/index.md
                    done
                  fi
                done
                
                # Add singleton contracts
                for contract in ./reputationBasedSingleton/contracts/*.sol; do
                  if [ -f "$contract" ]; then
                    contract_name=$(basename "$contract" .sol)
                    echo "### $contract_name" >> ./docs/api/generated/index.md
                    echo "" >> ./docs/api/generated/index.md
                    echo "**File:** \`$(basename "$contract")\`" >> ./docs/api/generated/index.md
                    echo "" >> ./docs/api/generated/index.md
                    
                    grep -n "contract\|interface\|library" "$contract" | head -5 | while read line; do
                      echo "\`\`\`solidity" >> ./docs/api/generated/index.md
                      echo "$line" >> ./docs/api/generated/index.md
                      echo "\`\`\`" >> ./docs/api/generated/index.md
                      echo "" >> ./docs/api/generated/index.md
                    done
                  fi
                done
                
                # Add arbiter operator contracts
                for contract in ./arbiterOperator/contracts/*.sol; do
                  if [ -f "$contract" ]; then
                    contract_name=$(basename "$contract" .sol)
                    echo "### $contract_name" >> ./docs/api/generated/index.md
                    echo "" >> ./docs/api/generated/index.md
                    echo "**File:** \`$(basename "$contract")\`" >> ./docs/api/generated/index.md
                    echo "" >> ./docs/api/generated/index.md
                    
                    grep -n "contract\|interface\|library" "$contract" | head -5 | while read line; do
                      echo "\`\`\`solidity" >> ./docs/api/generated/index.md
                      echo "$line" >> ./docs/api/generated/index.md
                      echo "\`\`\`" >> ./docs/api/generated/index.md
                      echo "" >> ./docs/api/generated/index.md
                    done
                  fi
                done
                
                echo "" >> ./docs/api/generated/index.md
                echo "---" >> ./docs/api/generated/index.md
                echo "*Auto-generated from contract source files*" >> ./docs/api/generated/index.md
              }
            else
              echo "No Solidity contracts found in ./reputationBasedAggregator/contracts"
              # Create placeholder API documentation
              mkdir -p ./docs/api/generated
              echo "# Contract API Documentation" > ./docs/api/generated/index.md
              echo "" >> ./docs/api/generated/index.md
              echo "Auto-generated contract documentation will appear here when contracts contain NatSpec comments." >> ./docs/api/generated/index.md
            fi
            
            # List generated files for debugging
            echo "Generated dispatcher docs:"
            ls -la ./docs/api/generated/ || echo "No files generated"
            
            cd ../..
          fi
          
          # Generate docs for arbiter contracts if they exist
          if [ -d "sources/arbiter/arbiter-operator/contracts" ]; then
            echo "Generating arbiter contract documentation..."
            cd sources/arbiter/arbiter-operator
            
            # Create package.json if it doesn't exist
            if [ ! -f "package.json" ]; then
              npm init -y
            fi
            
            # Install Hardhat documentation plugins  
            npm install hardhat @primitivefi/hardhat-dodoc hardhat-docgen --save-dev
            
            # Check if this is a Hardhat project
            if [ -f "hardhat.config.js" ] || [ -f "hardhat.config.ts" ]; then
              echo "Found Hardhat project, using Hardhat documentation tools..."
              
              # Try Hardhat-based documentation generation
              npx hardhat docgen 2>/dev/null || \
              npx hardhat dodoc 2>/dev/null || \
              echo "Hardhat documentation plugins not configured, falling back to simple parsing"
            else
              echo "Not a Hardhat project, using simple documentation generation..."
            fi
            
            # Create output directory
            mkdir -p ../installer/docs/docs/api/generated
            
            # Check if contracts exist first
            if [ -d "./contracts" ] && [ -n "$(find ./contracts -name '*.sol' 2>/dev/null)" ]; then
              echo "Found Solidity contracts, generating documentation..."
              
              # Create simple arbiter contract documentation
              mkdir -p ../installer/docs/docs/api/generated
              echo "# Arbiter Smart Contract API" > ../installer/docs/docs/api/generated/index.md
              echo "" >> ../installer/docs/docs/api/generated/index.md
              echo "## Available Contracts" >> ../installer/docs/docs/api/generated/index.md
              echo "" >> ../installer/docs/docs/api/generated/index.md
              
              for contract in ./contracts/*.sol; do
                if [ -f "$contract" ]; then
                  contract_name=$(basename "$contract" .sol)
                  echo "### $contract_name" >> ../installer/docs/docs/api/generated/index.md
                  echo "" >> ../installer/docs/docs/api/generated/index.md
                  echo "**File:** \`$(basename "$contract")\`" >> ../installer/docs/docs/api/generated/index.md
                  echo "" >> ../installer/docs/docs/api/generated/index.md
                  
                  # Extract contract declaration and basic info
                  grep -n "contract\|interface\|library" "$contract" | head -5 | while read line; do
                    echo "\`\`\`solidity" >> ../installer/docs/docs/api/generated/index.md
                    echo "$line" >> ../installer/docs/docs/api/generated/index.md
                    echo "\`\`\`" >> ../installer/docs/docs/api/generated/index.md
                    echo "" >> ../installer/docs/docs/api/generated/index.md
                  done
                fi
              done
              
              echo "" >> ../installer/docs/docs/api/generated/index.md
              echo "---" >> ../installer/docs/docs/api/generated/index.md
              echo "*Auto-generated from contract source files*" >> ../installer/docs/docs/api/generated/index.md
            else
              echo "No Solidity contracts found in ./contracts"
              # Create placeholder API documentation
              mkdir -p ../installer/docs/docs/api/generated
              echo "# Arbiter Contract API Documentation" > ../installer/docs/docs/api/generated/index.md
              echo "" >> ../installer/docs/docs/api/generated/index.md
              echo "Auto-generated arbiter contract documentation will appear here when contracts contain NatSpec comments." >> ../installer/docs/docs/api/generated/index.md
            fi
            
            # List generated files for debugging
            echo "Generated arbiter docs:"
            ls -la ../installer/docs/docs/api/generated/ || echo "No files generated"
            
            cd ../../..
          fi

      - name: Build documentation
        run: |
          mkdocs build

      - name: Verify build output
        run: |
          ls -la
          ls -la site/ || echo "site directory not found"

      - name: Copy Vercel config to site directory
        run: |
          cp vercel.json site/
          echo "Vercel config copied to site directory:"
          cat site/vercel.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: ./site
        run: |
          vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} 