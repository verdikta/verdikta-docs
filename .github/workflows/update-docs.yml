name: Update Documentation

on:
  push:
    branches: [main]
  schedule:
    # Check for updates every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update submodules
        run: |
          git pull --rebase
          git submodule update --remote --recursive
          
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-update submodules"
          git push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Smart Contract Documentation
        run: |
          echo "=== Smart Contract NatSpec Documentation Generation ==="
          
          # Make the NatSpec generator script executable
          chmod +x scripts/generate-natspec-docs.js
          
          # Generate docs for dispatcher contracts
          if [ -d "sources/dispatcher" ]; then
            echo "📄 Generating Dispatcher Contract Documentation..."
            node scripts/generate-natspec-docs.js \
              "sources/dispatcher" \
              "sources/dispatcher/docs/api/generated/index.md" \
              "Verdikta Dispatcher Smart Contracts"
          fi
          
          # Generate docs for arbiter contracts if they exist
          if [ -d "sources/arbiter/arbiter-operator/contracts" ]; then
            echo "📄 Generating Arbiter Contract Documentation..."
            mkdir -p "sources/arbiter/installer/docs/docs/api/generated"
            node scripts/generate-natspec-docs.js \
              "sources/arbiter/arbiter-operator/contracts" \
              "sources/arbiter/installer/docs/docs/api/generated/index.md" \
              "Verdikta Arbiter Smart Contracts"
          fi
          
          echo "✅ Smart Contract Documentation Generation Complete"

      - name: Build documentation
        run: |
          mkdocs build

      - name: Verify build output
        run: |
          ls -la
          ls -la site/ || echo "site directory not found"

      - name: Deploy to Vercel
        run: |
          npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --yes ./site
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} 