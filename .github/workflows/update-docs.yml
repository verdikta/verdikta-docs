name: Update Documentation

on:
  push:
    branches: [main]
  schedule:
    # Check for updates every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update submodules
        run: |
          git pull --rebase
          git submodule update --remote --recursive
          
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-update submodules"
          git push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Smart Contract Documentation
        run: |
          # Install dependencies locally
          npm init -y
          npm install solidity-docgen solc@0.8.19 --save-dev
          
          # Generate docs for dispatcher contracts
          if [ -d "sources/dispatcher/reputationBasedAggregator/contracts" ]; then
            echo "Generating dispatcher contract documentation..."
            cd sources/dispatcher
            
            # Create package.json if it doesn't exist
            if [ ! -f "package.json" ]; then
              npm init -y
            fi
            
            # Install dependencies in dispatcher directory
            npm install solidity-docgen solc@0.8.19 --save-dev
            
            # Create basic docgen config using echo
            echo "module.exports = {" > .solidity-docgen.js
            echo "  sourcesDir: './reputationBasedAggregator/contracts'," >> .solidity-docgen.js
            echo "  outputDir: './docs/api/generated'," >> .solidity-docgen.js
            echo "  pages: 'files'," >> .solidity-docgen.js
            echo "  exclude: ['test/**/*', 'mocks/**/*']," >> .solidity-docgen.js
            echo "  solcSettings: {" >> .solidity-docgen.js
            echo "    optimizer: { enabled: true, runs: 200 }" >> .solidity-docgen.js
            echo "  }" >> .solidity-docgen.js
            echo "};" >> .solidity-docgen.js
            
            # Create API generated directory
            mkdir -p ./docs/api/generated
            
            # Generate documentation with error handling
            npx solidity-docgen || echo "Warning: solidity-docgen failed for dispatcher contracts"
            
            # List generated files for debugging
            echo "Generated dispatcher docs:"
            ls -la ./docs/api/generated/ || echo "No files generated"
            
            cd ../..
          fi
          
          # Generate docs for arbiter contracts if they exist
          if [ -d "sources/arbiter/arbiter-operator/contracts" ]; then
            echo "Generating arbiter contract documentation..."
            cd sources/arbiter/arbiter-operator
            
            # Create package.json if it doesn't exist
            if [ ! -f "package.json" ]; then
              npm init -y
            fi
            
            # Install dependencies
            npm install solidity-docgen solc@0.8.19 --save-dev
            
            # Create docgen config using echo
            echo "module.exports = {" > .solidity-docgen.js
            echo "  sourcesDir: './contracts'," >> .solidity-docgen.js
            echo "  outputDir: '../installer/docs/docs/api/generated'," >> .solidity-docgen.js
            echo "  pages: 'files'," >> .solidity-docgen.js
            echo "  exclude: ['test/**/*', 'mocks/**/*']" >> .solidity-docgen.js
            echo "};" >> .solidity-docgen.js
            
            # Create output directory
            mkdir -p ../installer/docs/docs/api/generated
            
            # Generate documentation with error handling
            npx solidity-docgen || echo "Warning: solidity-docgen failed for arbiter contracts"
            
            # List generated files for debugging
            echo "Generated arbiter docs:"
            ls -la ../installer/docs/docs/api/generated/ || echo "No files generated"
            
            cd ../../..
          fi

      - name: Build documentation
        run: |
          mkdocs build

      - name: Verify build output
        run: |
          ls -la
          ls -la site/ || echo "site directory not found"

      - name: Copy Vercel config to site directory
        run: |
          cp vercel.json site/
          echo "Vercel config copied to site directory:"
          cat site/vercel.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: ./site
        run: |
          vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} 