name: Update Documentation

on:
  push:
    branches: [main]
  schedule:
    # Check for updates every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update submodules
        run: |
          git pull --rebase
          git submodule update --remote --recursive
          
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-update submodules"
          git push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Smart Contract Documentation
        run: |
          # Install solidity-docgen globally
          npm install -g solidity-docgen
          
          # Generate docs for dispatcher contracts
          if [ -d "sources/dispatcher/reputationBasedAggregator/contracts" ]; then
            echo "Generating dispatcher contract documentation..."
            cd sources/dispatcher
            
            # Create docgen config if it doesn't exist
            cat > docgen.json << 'EOF'
          {
            "outputDir": "./docs/api/generated",
            "pages": "files",
            "exclude": ["test", "mock"],
            "sourcesDir": "./reputationBasedAggregator/contracts",
            "templates": "./docs/templates"
          }
          EOF
            
            # Generate documentation
            npx solidity-docgen --solc-module solc-0.8.19
            cd ../..
          fi
          
          # Generate docs for arbiter contracts if they exist
          if [ -d "sources/arbiter/arbiter-operator/contracts" ]; then
            echo "Generating arbiter contract documentation..."
            cd sources/arbiter/arbiter-operator
            
            cat > docgen.json << 'EOF'
          {
            "outputDir": "../installer/docs/docs/api/generated",
            "pages": "files",
            "exclude": ["test", "mock"],
            "sourcesDir": "./contracts"
          }
          EOF
            
            npx solidity-docgen --solc-module solc-0.8.19
            cd ../../..
          fi

      - name: Build documentation
        run: |
          mkdocs build

      - name: Verify build output
        run: |
          ls -la
          ls -la site/ || echo "site directory not found"

      - name: Copy Vercel config to site directory
        run: |
          cp vercel.json site/
          echo "Vercel config copied to site directory:"
          cat site/vercel.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: ./site
        run: |
          vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} 